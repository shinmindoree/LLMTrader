name: Rotate Auth Secrets

on:
  schedule:
    # Monthly rotation (at 03:00 UTC on the 1st of each month)
    - cron: "0 3 1 * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rotate:
    runs-on: ubuntu-latest
    environment: secret-rotation
    permissions:
      id-token: write
      contents: read
    env:
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP_TEST }}

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_TEST }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_TEST }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_TEST }}

      - name: Generate new AUTH_SECRET
        id: new_secret
        run: |
          NEW_SECRET=$(openssl rand -hex 32)
          echo "::add-mask::${NEW_SECRET}"
          echo "value=${NEW_SECRET}" >> "$GITHUB_OUTPUT"

      - name: Update Container App secrets
        run: |
          for APP in test-api test-web; do
            echo "Updating auth-secret on ${APP}..."
            az containerapp secret set \
              -n "${APP}" \
              -g "${RESOURCE_GROUP}" \
              --secrets "auth-secret=${{ steps.new_secret.outputs.value }}"
          done

      - name: Restart Container Apps to pick up new secret
        run: |
          for APP in test-api test-web; do
            echo "Restarting ${APP}..."
            az containerapp revision restart \
              -n "${APP}" \
              -g "${RESOURCE_GROUP}" \
              --revision "$(az containerapp revision list -n "${APP}" -g "${RESOURCE_GROUP}" --query "[0].name" -o tsv)"
          done

      - name: Verify secrets updated
        run: |
          for APP in test-api test-web; do
            az containerapp secret show \
              -n "${APP}" \
              -g "${RESOURCE_GROUP}" \
              --secret-name "auth-secret" \
              --query name -o tsv
          done
          echo "Auth secret rotation complete."
