name: Rotate Entra Client Secret

on:
  schedule:
    # Every 25 days (at 03:00 UTC on the 1st and 26th of each month)
    - cron: "0 3 1,26 * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rotate:
    runs-on: ubuntu-latest
    environment: secret-rotation
    permissions:
      id-token: write
      contents: read
    env:
      ENTRA_APP_OBJECT_ID: b85a69d7-d7fb-4945-8d56-53fd56ba3db1
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP_TEST }}
      SECRET_NAME: entra-client-secret
      # Tenant max = 30 days; create 29-day secrets so rotation has margin
      SECRET_DAYS: 29

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_TEST }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_TEST }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_TEST }}

      - name: Create new client secret via Graph API
        id: new_secret
        run: |
          END_DATE=$(date -u -d "+${SECRET_DAYS} days" +%Y-%m-%dT%H:%M:%SZ)
          DISPLAY_NAME="auto-$(date -u +%Y%m%d)"

          RESPONSE=$(az rest --method POST \
            --url "https://graph.microsoft.com/v1.0/applications/${ENTRA_APP_OBJECT_ID}/addPassword" \
            --body "{\"passwordCredential\":{\"displayName\":\"${DISPLAY_NAME}\",\"endDateTime\":\"${END_DATE}\"}}")

          CRED=$(echo "$RESPONSE" | jq -r '.secretText')
          NEW_KEY_ID=$(echo "$RESPONSE" | jq -r '.keyId')

          if [ -z "$CRED" ] || [ "$CRED" = "null" ]; then
            echo "::error::Failed to create new client secret"
            exit 1
          fi
          echo "::add-mask::${CRED}"
          echo "value=${CRED}" >> "$GITHUB_OUTPUT"
          echo "key_id=${NEW_KEY_ID}" >> "$GITHUB_OUTPUT"

      - name: Update Container App secrets (test-api & test-web)
        run: |
          for APP in test-api test-web; do
            az containerapp secret set \
              -n "${APP}" \
              -g "${RESOURCE_GROUP}" \
              --secrets "${SECRET_NAME}=${{ steps.new_secret.outputs.value }}"
          done

      - name: Verify Container App secrets
        run: |
          for APP in test-api test-web; do
            az containerapp secret show \
              -n "${APP}" \
              -g "${RESOURCE_GROUP}" \
              --secret-name "${SECRET_NAME}" \
              --query name -o tsv
          done

      - name: Clean up old credentials
        run: |
          NEW_KEY_ID="${{ steps.new_secret.outputs.key_id }}"
          # List all password credentials, delete all except the newly created one
          KEY_IDS=$(az rest --method GET \
            --url "https://graph.microsoft.com/v1.0/applications/${ENTRA_APP_OBJECT_ID}" \
            --query "passwordCredentials[].keyId" -o tsv)

          for KEY_ID in $KEY_IDS; do
            if [ "$KEY_ID" != "$NEW_KEY_ID" ]; then
              echo "Removing old credential: ${KEY_ID}"
              az rest --method POST \
                --url "https://graph.microsoft.com/v1.0/applications/${ENTRA_APP_OBJECT_ID}/removePassword" \
                --body "{\"keyId\":\"${KEY_ID}\"}"
            fi
          done
