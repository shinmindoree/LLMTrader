name: Web CI

on:
  pull_request:
    paths:
      - "web/**"
  push:
    branches: [main]
    paths:
      - "web/**"

defaults:
  run:
    working-directory: web

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://alphaweaver.com
