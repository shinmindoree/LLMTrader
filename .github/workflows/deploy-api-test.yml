name: Deploy API (test)

# When this action will be executed
on:
  # Automatically trigger it when API related files change
  push:
    branches:
      - main
    paths:
      - src/**
      - scripts/**
      - pyproject.toml
      - uv.lock
      - infra/Dockerfile.api
      - .github/workflows/deploy-api-test.yml
      - .github/workflows/llmtrader-api-AutoDeployTrigger-51b80701-055a-457e-a751-7ca8a724937c.yml

  # Allow manual trigger
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP_TEST }}
      AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME_TEST }}
      AZURE_ACR_LOGIN_SERVER: ${{ vars.AZURE_ACR_LOGIN_SERVER_TEST }}
      AZURE_CONTAINER_APP_NAME: test-api
      IMAGE_NAME: service-api
      OI_BLOB_ACCOUNT_URL: https://teststrategies.blob.core.windows.net
      OI_BLOB_CONTAINER: market-data
      OI_BLOB_NAME_BTCUSDT: perp_meta/BTCUSDT_oi_5m.parquet

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Validate workflow inputs
        run: |
          : "${AZURE_RESOURCE_GROUP:?Missing vars.AZURE_RESOURCE_GROUP_TEST}"
          : "${AZURE_ACR_NAME:?Missing vars.AZURE_ACR_NAME_TEST}"
          : "${AZURE_ACR_LOGIN_SERVER:?Missing vars.AZURE_ACR_LOGIN_SERVER_TEST}"
          : "${AZURE_CONTAINER_APP_NAME:?Missing AZURE_CONTAINER_APP_NAME}"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_TEST }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_TEST }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_TEST }}

      - name: Build and push container image to registry
        run: |
          IMAGE_TAG="${AZURE_ACR_LOGIN_SERVER}/${IMAGE_NAME}:${GITHUB_SHA}"
          az acr login --name "${AZURE_ACR_NAME}"
          docker build -f infra/Dockerfile.api -t "${IMAGE_TAG}" .
          docker push "${IMAGE_TAG}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "${GITHUB_ENV}"

      - name: Update Container App image
        # NOTE: cpu=2.0 / memory=4Gi is required to avoid OOM (exit 137) during cold start
        # (alembic upgrade + init_db + Redis AAD ping + LLM client init peaks well above 2Gi).
        # See /memories/repo/test-api-redis-aad.md and incident on 2026-05-04.
        # Do NOT lower these values without first reducing startup memory peak.
        run: |
          az containerapp update \
            --name "${AZURE_CONTAINER_APP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --image "${IMAGE_TAG}" \
            --cpu 2.0 --memory 4Gi \
            --set-env-vars \
            EMBEDDED_RUNNER=false \
            AZURE_BLOB_ACCOUNT_URL="${OI_BLOB_ACCOUNT_URL}" \
            OI_PARQUET_BLOB_CONTAINER="${OI_BLOB_CONTAINER}" \
            OI_PARQUET_BLOB_NAME_BTCUSDT="${OI_BLOB_NAME_BTCUSDT}"


