name: Ingest Funding Rates (test)

# Daily batch that appends the latest funding-rate history for the top-N
# USDT-PERP universe into the Azure Blob data lake
# (market-data/funding-rates/version=1/symbol=*/data.parquet).
#
# fundingRate is a PUBLIC Binance endpoint -> no exchange API key needed.
#
# Prerequisites (one-time infra):
#   - The OIDC service principal (secrets.AZURE_CLIENT_ID_TEST) must have
#     "Storage Blob Data Contributor" on the storage account behind
#     AZURE_BLOB_ACCOUNT_URL.

on:
  schedule:
    - cron: "15 0 * * *" # UTC 00:15 == KST 09:15 (just after Binance's first daily settlement)
  workflow_dispatch:
    inputs:
      top_n:
        description: "Number of top USDT-PERP symbols by 24h quote volume"
        required: false
        default: "50"

permissions:
  id-token: write
  contents: read

env:
  AZURE_BLOB_ACCOUNT_URL: https://teststrategies.blob.core.windows.net
  FUNDING_BLOB_CONTAINER: market-data
  FUNDING_BLOB_PREFIX: funding-rates/version=1
  FUNDING_TOP_N: ${{ github.event.inputs.top_n || '50' }}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "httpx>=0.27" "pandas>=2.2" "pyarrow>=15" \
            "azure-storage-blob>=12.20" "azure-identity>=1.15"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_TEST }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_TEST }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_TEST }}

      - name: Refresh funding-rate parquet (top-N universe)
        run: |
          python -u scripts/refresh_funding_parquet.py \
            --all-symbols \
            --top-n "${FUNDING_TOP_N}" \
            --blob-container "${FUNDING_BLOB_CONTAINER}" \
            --blob-prefix "${FUNDING_BLOB_PREFIX}"
