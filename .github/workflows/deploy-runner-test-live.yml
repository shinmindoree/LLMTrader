name: Deploy Runner (test, live)

# Deploys the LIVE half of the runner split. This workflow is **manual only**
# (workflow_dispatch). It is intentionally NOT triggered by pushes — backtest
# commits land on `main` constantly, and we never want them to bump the LIVE
# container revision and disrupt running LIVE jobs / in-memory leg state.
#
# Operator workflow:
#   1. Verify the desired commit is healthy on the backtest runner.
#   2. Trigger this workflow with the chosen `git_sha` (defaults to the
#      latest commit on the branch when omitted).
#   3. The LIVE container's strategy state is persisted to Redis on
#      shutdown and restored on restart, but a manual deploy still
#      requires a (typically short) drain window.
#
# Live container ENV (set on every deploy, idempotent):
#   - RUNNER_ROLE=live           : only LIVE job loops + stale-live reconcile
#   - AUTO_ALEMBIC_UPGRADE=false : migrations are owned by the backtest
#                                  container / API; the LIVE container must
#                                  never run alembic so it can start quickly
#                                  and cannot race the sibling on schema
#                                  locks.
on:
  workflow_dispatch:
    inputs:
      git_sha:
        description: "Commit SHA to deploy (defaults to HEAD of the workflow branch)"
        required: false
        type: string
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP_TEST }}
      AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME_TEST }}
      AZURE_ACR_LOGIN_SERVER: ${{ vars.AZURE_ACR_LOGIN_SERVER_TEST }}
      AZURE_CONTAINER_APP_NAME: test-runner
      AZURE_REDIS_NAME: fdpo-test-redis
      AZURE_REDIS_HOST: fdpo-test-redis.redis.cache.windows.net
      IMAGE_NAME: service-runner
      OI_BLOB_ACCOUNT_URL: https://teststrategies.blob.core.windows.net
      OI_BLOB_CONTAINER: market-data
      OI_BLOB_NAME_BTCUSDT: perp_meta/BTCUSDT_oi_5m.parquet
      INPUT_GIT_SHA: ${{ github.event.inputs.git_sha }}

    steps:
      - name: Resolve deploy SHA
        id: resolve_sha
        run: |
          if [ -n "${INPUT_GIT_SHA}" ]; then
            DEPLOY_SHA="${INPUT_GIT_SHA}"
          else
            DEPLOY_SHA="${GITHUB_SHA}"
          fi
          echo "Deploying SHA: ${DEPLOY_SHA}"
          echo "DEPLOY_SHA=${DEPLOY_SHA}" >> "${GITHUB_ENV}"

      - name: Checkout requested SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Validate workflow inputs
        run: |
          : "${AZURE_RESOURCE_GROUP:?Missing vars.AZURE_RESOURCE_GROUP_TEST}"
          : "${AZURE_ACR_NAME:?Missing vars.AZURE_ACR_NAME_TEST}"
          : "${AZURE_ACR_LOGIN_SERVER:?Missing vars.AZURE_ACR_LOGIN_SERVER_TEST}"
          : "${AZURE_CONTAINER_APP_NAME:?Missing AZURE_CONTAINER_APP_NAME}"
          : "${DEPLOY_SHA:?Missing DEPLOY_SHA}"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_TEST }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_TEST }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_TEST }}

      - name: Build and push container image to registry
        run: |
          IMAGE_TAG="${AZURE_ACR_LOGIN_SERVER}/${IMAGE_NAME}:${DEPLOY_SHA}"
          az acr login --name "${AZURE_ACR_NAME}"
          # If the same SHA was already built by the backtest workflow the
          # push is a no-op; otherwise we build and push.
          if ! docker manifest inspect "${IMAGE_TAG}" >/dev/null 2>&1; then
            docker build -f infra/Dockerfile.runner -t "${IMAGE_TAG}" .
            docker push "${IMAGE_TAG}"
          else
            echo "Image ${IMAGE_TAG} already exists in ACR; skipping build."
          fi
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "${GITHUB_ENV}"

      - name: Update Container App image
        run: |
          REDIS_NAME="${AZURE_REDIS_NAME:-fdpo-test-redis}"
          REDIS_HOST="${AZURE_REDIS_HOST:-fdpo-test-redis.redis.cache.windows.net}"
          REDIS_AAD_USERNAME="$(az containerapp show \
            --name "${AZURE_CONTAINER_APP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query identity.principalId \
            --output tsv)"
          EXISTING_ASSIGNMENT="$(az redis access-policy-assignment list \
            --name "${REDIS_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query "[?objectId=='${REDIS_AAD_USERNAME}'].name | [0]" \
            --output tsv)"
          if [ -z "${EXISTING_ASSIGNMENT}" ]; then
            az redis access-policy-assignment create \
              --name "${REDIS_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --policy-assignment-name "${AZURE_CONTAINER_APP_NAME}-data-contributor" \
              --access-policy-name "Data Contributor" \
              --object-id "${REDIS_AAD_USERNAME}" \
              --object-id-alias "${AZURE_CONTAINER_APP_NAME}"
          fi
          az containerapp update \
            --name "${AZURE_CONTAINER_APP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --image "${IMAGE_TAG}" \
            --remove-env-vars REDIS_URL REDIS_PASSWORD \
            --set-env-vars \
            REDIS_HOST="${REDIS_HOST}" \
            REDIS_PORT=6380 \
            REDIS_SSL=true \
            REDIS_USERNAME="${REDIS_AAD_USERNAME}" \
            AZURE_BLOB_ACCOUNT_URL="${OI_BLOB_ACCOUNT_URL}" \
            OI_PARQUET_BLOB_CONTAINER="${OI_BLOB_CONTAINER}" \
            OI_PARQUET_BLOB_NAME_BTCUSDT="${OI_BLOB_NAME_BTCUSDT}" \
            RUNNER_ROLE=live \
            AUTO_ALEMBIC_UPGRADE=false \
            SLACK_WEBHOOK_URL=secretref:slack-webhook-url
