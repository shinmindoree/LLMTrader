# mac/minsuk 푸시 시 origin/main에 자동 머지 (수동 동기화 대체)
#
# main 브랜치 보호(필수 PR/리뷰)가 있으면 기본 GITHUB_TOKEN으로는 push가 거절될 수 있음.
# 해결: (1) Rules에서 github-actions[bot]에게 bypass 허용
#   또는 (2) repo 권한 PAT를 SYNC_MAIN_PAT 시크릿으로 등록 (아래 checkout token)
#
# GITHUB_TOKEN으로 main에 push하면 다른 워크플로(예: Deploy Web (test))가 트리거되지 않음.
# main 푸시 후 자동 배포까지 원하면 반드시 SYNC_MAIN_PAT을 설정하세요.
# 미설정 시 github.token으로 폴백(머지는 되나 Deploy는 수동 Run workflow 필요).

name: Sync mac/minsuk to main

on:
  push:
    branches:
      - mac/minsuk

concurrency:
  group: sync-mac-minsuk-to-main
  cancel-in-progress: true

jobs:
  merge-to-main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_MAIN_PAT || github.token }}

      # 로컬에서 하는 것과 동일:
      #   git checkout main && git pull origin main && git merge --ff-only mac/minsuk && git push origin main
      - name: Fast-forward main to mac/minsuk and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main mac/minsuk
          git checkout main
          git pull origin main
          git merge --ff-only origin/mac/minsuk
          git push origin main
