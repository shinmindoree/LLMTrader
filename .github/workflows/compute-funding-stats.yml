name: Compute Funding Stats (test)

# Weekly offline job: loads the funding-rate data lake from Azure Blob,
# estimates an AR(1)/Ornstein-Uhlenbeck mean-reversion half-life per symbol,
# and caches a lightweight JSON per symbol in Redis (funding:stats:{SYMBOL})
# for the live engine to read in O(1).
#
# Prerequisites (one-time infra):
#   - The OIDC service principal (secrets.AZURE_CLIENT_ID_TEST) must have
#     "Storage Blob Data Reader" on the storage account, and be registered as
#     a Redis Entra (AAD) data-access user matching AZURE_REDIS_AAD_USERNAME.

on:
  schedule:
    - cron: "0 1 * * 0" # UTC Sun 01:00 == KST Sun 10:00
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_BLOB_ACCOUNT_URL: https://teststrategies.blob.core.windows.net
  FUNDING_BLOB_CONTAINER: market-data
  FUNDING_BLOB_PREFIX: funding-rates/version=1
  REDIS_HOST: ${{ vars.AZURE_REDIS_HOST_TEST }}
  REDIS_USERNAME: ${{ vars.AZURE_REDIS_AAD_USERNAME_TEST }}
  REDIS_PORT: "6380"
  REDIS_SSL: "true"

jobs:
  compute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pandas>=2.2" "pyarrow>=15" "numpy>=1.26" \
            "azure-storage-blob>=12.20" "azure-identity>=1.15" "redis[hiredis]>=5.0"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_TEST }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_TEST }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_TEST }}

      - name: Compute half-life stats and cache to Redis
        run: |
          REDIS_HOST="${REDIS_HOST:-fdpo-test-redis.redis.cache.windows.net}"
          python -u scripts/compute_funding_stats.py \
            --blob-container "${FUNDING_BLOB_CONTAINER}" \
            --blob-prefix "${FUNDING_BLOB_PREFIX}"
