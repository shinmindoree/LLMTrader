name: Deploy Web (test)

on:
  push:
    branches:
      - main
    paths:
      - web/**
      - infra/Dockerfile.web
      - .github/workflows/deploy-web-test.yml
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP_TEST }}
      AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME_TEST }}
      AZURE_ACR_LOGIN_SERVER: ${{ vars.AZURE_ACR_LOGIN_SERVER_TEST }}
      AZURE_CONTAINER_APP_NAME: test-web
      IMAGE_NAME: service-web

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Validate workflow inputs
        run: |
          : "${AZURE_RESOURCE_GROUP:?Missing vars.AZURE_RESOURCE_GROUP_TEST}"
          : "${AZURE_ACR_NAME:?Missing vars.AZURE_ACR_NAME_TEST}"
          : "${AZURE_ACR_LOGIN_SERVER:?Missing vars.AZURE_ACR_LOGIN_SERVER_TEST}"
          : "${AZURE_CONTAINER_APP_NAME:?Missing AZURE_CONTAINER_APP_NAME}"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_TEST }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_TEST }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_TEST }}

      - name: Build and push container image to registry
        run: |
          IMAGE_TAG="${AZURE_ACR_LOGIN_SERVER}/${IMAGE_NAME}:${GITHUB_SHA}"
          az acr login --name "${AZURE_ACR_NAME}"
          docker build -f infra/Dockerfile.web \
            --build-arg NEXT_PUBLIC_ENTRA_AUTH_ENABLED=true \
            --build-arg NEXT_PUBLIC_ENTRA_TENANT_ID=${{ vars.ENTRA_TENANT_ID }} \
            --build-arg NEXT_PUBLIC_ENTRA_CLIENT_ID=${{ vars.ENTRA_CLIENT_ID }} \
            --build-arg NEXT_PUBLIC_SITE_URL=${{ vars.SITE_URL }} \
            -t "${IMAGE_TAG}" .
          docker push "${IMAGE_TAG}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "${GITHUB_ENV}"

      - name: Update Container App image
        run: |
          az containerapp update \
            --name "${AZURE_CONTAINER_APP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --image "${IMAGE_TAG}"
