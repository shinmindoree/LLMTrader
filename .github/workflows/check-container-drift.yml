name: Check Container Drift

# Schema-drift early-warning gate.
#
# Background: the LIVE runner (`test-runner`) is deployed by a **manual**
# workflow, while `test-api` and `test-runner-backtest` auto-deploy on every
# push to main and OWN the database schema (AUTO_ALEMBIC_UPGRADE=true). When a
# destructive migration lands, the schema advances but the LIVE runner stays
# frozen on an old image whose ORM still maps the now-deleted columns — every
# profile read then raises UndefinedColumnError and LIVE jobs FAIL silently.
#
# This job reads the git-SHA image tags of all three containers and compares
# them by ANCESTRY (not naive string equality). It fails loudly ONLY when the
# LIVE runner is a strict ancestor of — i.e. genuinely OLDER than — a
# schema-owning container, so an operator redeploys the LIVE runner BEFORE the
# next destructive migration. A bare SHA mismatch is not drift: main can
# legitimately advance past api/backtest via a commit their `paths:` filters
# skip (e.g. a docs-only commit) while the unfiltered LIVE workflow deploys main
# HEAD, leaving LIVE strictly AHEAD — which is safe.
#
# It does NOT mutate anything; it only inspects and reports.

on:
  schedule:
    # 00:30 UTC daily (~09:30 KST).
    - cron: "30 0 * * *"
  workflow_dispatch:
  workflow_run:
    # Re-check immediately after a schema-owning container redeploys.
    workflows:
      - "Deploy API (test)"
      - "Deploy Runner (test, backtest)"
      - "Deploy Runner (test, live)"
    types:
      - completed

permissions:
  id-token: write
  contents: read

jobs:
  check-drift:
    runs-on: ubuntu-latest
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP_TEST }}
      APP_API: test-api
      APP_LIVE: test-runner
      APP_BACKTEST: test-runner-backtest
    steps:
      # Full history is required so we can reason about ANCESTRY between the
      # image SHAs rather than naive string inequality. A plain SHA mismatch is
      # not drift: main can legitimately advance past the schema-owning
      # containers via a commit their `paths:` filters skip (e.g. a docs-only
      # commit), while the LIVE workflow — which has no path filter — deploys
      # main HEAD. That leaves LIVE strictly AHEAD, which is safe.
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_TEST }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_TEST }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_TEST }}

      - name: Compare container image SHAs
        run: |
          set -euo pipefail

          image_of() {
            az containerapp show \
              --name "$1" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "properties.template.containers[0].image" \
              --output tsv
          }

          # Extract the part after the last ':' (the git-SHA tag).
          tag_of() { echo "${1##*:}"; }

          # Classify the git relationship of SHA $1 relative to SHA $2:
          #   same     - identical commit
          #   behind   - $1 is a strict ancestor of $2 ($1 is OLDER)
          #   ahead    - $1 is a strict descendant of $2 ($1 is NEWER)
          #   diverged - no ancestor relationship in either direction
          #   unknown  - one of the SHAs is absent from local git history
          relation() {
            a="$1"; b="$2"
            if [ "${a}" = "${b}" ]; then echo "same"; return; fi
            if ! git cat-file -e "${a}^{commit}" 2>/dev/null || ! git cat-file -e "${b}^{commit}" 2>/dev/null; then
              echo "unknown"; return
            fi
            if git merge-base --is-ancestor "${a}" "${b}"; then echo "behind"; return; fi
            if git merge-base --is-ancestor "${b}" "${a}"; then echo "ahead"; return; fi
            echo "diverged"
          }

          API_IMAGE="$(image_of "${APP_API}")"
          LIVE_IMAGE="$(image_of "${APP_LIVE}")"
          BACKTEST_IMAGE="$(image_of "${APP_BACKTEST}")"

          API_SHA="$(tag_of "${API_IMAGE}")"
          LIVE_SHA="$(tag_of "${LIVE_IMAGE}")"
          BACKTEST_SHA="$(tag_of "${BACKTEST_IMAGE}")"

          LIVE_VS_BACKTEST="$(relation "${LIVE_SHA}" "${BACKTEST_SHA}")"
          LIVE_VS_API="$(relation "${LIVE_SHA}" "${API_SHA}")"
          API_VS_BACKTEST="$(relation "${API_SHA}" "${BACKTEST_SHA}")"

          {
            echo "### Container image drift report"
            echo ""
            echo "| Container | Role | Image SHA |"
            echo "| --- | --- | --- |"
            echo "| ${APP_API} | schema-owner (api) | \`${API_SHA}\` |"
            echo "| ${APP_BACKTEST} | schema-owner (backtest, runs alembic) | \`${BACKTEST_SHA}\` |"
            echo "| ${APP_LIVE} | LIVE runner (manual deploy) | \`${LIVE_SHA}\` |"
            echo ""
            echo "Relations: LIVE→backtest = \`${LIVE_VS_BACKTEST}\`, LIVE→api = \`${LIVE_VS_API}\`, api→backtest = \`${API_VS_BACKTEST}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

          DRIFT=0
          MSG=""

          # The ONLY dangerous condition is the LIVE runner executing code that is
          # strictly OLDER than a schema-owning container: a destructive migration
          # owned by api/backtest can drop columns the stale LIVE ORM still maps,
          # making every LIVE profile read raise UndefinedColumnError. LIVE being
          # equal to — or AHEAD of — the schema owners is safe.
          if [ "${LIVE_VS_BACKTEST}" = "behind" ]; then
            DRIFT=1
            MSG="${MSG}\n- LIVE runner (${LIVE_SHA}) is BEHIND the alembic-owning backtest container (${BACKTEST_SHA})."
          fi
          if [ "${LIVE_VS_API}" = "behind" ]; then
            DRIFT=1
            MSG="${MSG}\n- LIVE runner (${LIVE_SHA}) is BEHIND the schema-owning api container (${API_SHA})."
          fi

          # Inconclusive ancestry must not silently pass — a missing or diverged
          # SHA could mask a real drift, so surface it for manual inspection.
          if [ "${LIVE_VS_BACKTEST}" = "unknown" ] || [ "${LIVE_VS_API}" = "unknown" ]; then
            DRIFT=1
            MSG="${MSG}\n- Could not resolve git ancestry for a LIVE/schema-owner SHA (not found in history). Inspect manually."
          fi
          if [ "${LIVE_VS_BACKTEST}" = "diverged" ] || [ "${LIVE_VS_API}" = "diverged" ]; then
            DRIFT=1
            MSG="${MSG}\n- LIVE runner SHA has diverged from a schema owner (no ancestor relationship). Inspect manually."
          fi

          if [ "${DRIFT}" -eq 1 ]; then
            MSG="${MSG}\n  Redeploy the LIVE runner: \`gh workflow run deploy-runner-test-live.yml --ref main\` BEFORE merging any destructive migration."
            {
              echo ""
              echo "#### ⚠️ DRIFT DETECTED"
              echo -e "${MSG}"
            } >> "${GITHUB_STEP_SUMMARY}"
            echo -e "DRIFT DETECTED:${MSG}"
            exit 1
          fi

          # Note (informational only): api and backtest can legitimately differ
          # because their `paths:` filters trigger on different file sets, so a
          # mismatch here is NOT failed — only a LIVE-behind state is.
          {
            echo ""
            echo "✅ LIVE runner is not behind any schema-owning container."
          } >> "${GITHUB_STEP_SUMMARY}"
          echo "OK: LIVE runner is not behind any schema-owning container (LIVE→backtest=${LIVE_VS_BACKTEST}, LIVE→api=${LIVE_VS_API})."
