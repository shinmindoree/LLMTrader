name: Check Container Drift

# Schema-drift early-warning gate.
#
# Background: the LIVE runner (`test-runner`) is deployed by a **manual**
# workflow, while `test-api` and `test-runner-backtest` auto-deploy on every
# push to main and OWN the database schema (AUTO_ALEMBIC_UPGRADE=true). When a
# destructive migration lands, the schema advances but the LIVE runner stays
# frozen on an old image whose ORM still maps the now-deleted columns — every
# profile read then raises UndefinedColumnError and LIVE jobs FAIL silently.
#
# This job reads the git-SHA image tags of all three containers and compares
# them by ANCESTRY (not naive string equality). A bare SHA mismatch is NOT
# drift, and even a LIVE runner that is strictly OLDER than a schema owner is
# NOT inherently dangerous: additive (Expand/Contract) migrations leave the old
# ORM working because it simply ignores the new columns. The ONLY dangerous case
# is a LIVE runner that is BEHIND a schema owner AND a DESTRUCTIVE migration
# (drop_column / drop_table / rename) landed in the commits the schema owner has
# but LIVE lacks — that is exactly when the stale ORM maps a now-deleted column
# and every LIVE profile read raises UndefinedColumnError. Only then does it fail
# loudly, so an operator redeploys the LIVE runner. This keeps the check quiet on
# the routine "LIVE lags by additive-only commits" state that occurs after every
# push (api/backtest auto-deploy while LIVE is deployed manually).
#
# It does NOT mutate anything; it only inspects and reports.

on:
  schedule:
    # 00:30 UTC daily (~09:30 KST).
    - cron: "30 0 * * *"
  workflow_dispatch:
  workflow_run:
    # Re-check immediately after a schema-owning container redeploys.
    workflows:
      - "Deploy API (test)"
      - "Deploy Runner (test, backtest)"
      - "Deploy Runner (test, live)"
    types:
      - completed

permissions:
  id-token: write
  contents: read

jobs:
  check-drift:
    runs-on: ubuntu-latest
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP_TEST }}
      APP_API: test-api
      APP_LIVE: test-runner
      APP_BACKTEST: test-runner-backtest
    steps:
      # Full history is required so we can reason about ANCESTRY between the
      # image SHAs rather than naive string inequality. A plain SHA mismatch is
      # not drift: main can legitimately advance past the schema-owning
      # containers via a commit their `paths:` filters skip (e.g. a docs-only
      # commit), while the LIVE workflow — which has no path filter — deploys
      # main HEAD. That leaves LIVE strictly AHEAD, which is safe.
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_TEST }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_TEST }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_TEST }}

      - name: Compare container image SHAs
        run: |
          set -euo pipefail

          image_of() {
            az containerapp show \
              --name "$1" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "properties.template.containers[0].image" \
              --output tsv
          }

          # Extract the part after the last ':' (the git-SHA tag).
          tag_of() { echo "${1##*:}"; }

          # Classify the git relationship of SHA $1 relative to SHA $2:
          #   same     - identical commit
          #   behind   - $1 is a strict ancestor of $2 ($1 is OLDER)
          #   ahead    - $1 is a strict descendant of $2 ($1 is NEWER)
          #   diverged - no ancestor relationship in either direction
          #   unknown  - one of the SHAs is absent from local git history
          relation() {
            a="$1"; b="$2"
            if [ "${a}" = "${b}" ]; then echo "same"; return; fi
            if ! git cat-file -e "${a}^{commit}" 2>/dev/null || ! git cat-file -e "${b}^{commit}" 2>/dev/null; then
              echo "unknown"; return
            fi
            if git merge-base --is-ancestor "${a}" "${b}"; then echo "behind"; return; fi
            if git merge-base --is-ancestor "${b}" "${a}"; then echo "ahead"; return; fi
            echo "diverged"
          }

          API_IMAGE="$(image_of "${APP_API}")"
          LIVE_IMAGE="$(image_of "${APP_LIVE}")"
          BACKTEST_IMAGE="$(image_of "${APP_BACKTEST}")"

          API_SHA="$(tag_of "${API_IMAGE}")"
          LIVE_SHA="$(tag_of "${LIVE_IMAGE}")"
          BACKTEST_SHA="$(tag_of "${BACKTEST_IMAGE}")"

          LIVE_VS_BACKTEST="$(relation "${LIVE_SHA}" "${BACKTEST_SHA}")"
          LIVE_VS_API="$(relation "${LIVE_SHA}" "${API_SHA}")"
          API_VS_BACKTEST="$(relation "${API_SHA}" "${BACKTEST_SHA}")"

          {
            echo "### Container image drift report"
            echo ""
            echo "| Container | Role | Image SHA |"
            echo "| --- | --- | --- |"
            echo "| ${APP_API} | schema-owner (api) | \`${API_SHA}\` |"
            echo "| ${APP_BACKTEST} | schema-owner (backtest, runs alembic) | \`${BACKTEST_SHA}\` |"
            echo "| ${APP_LIVE} | LIVE runner (manual deploy) | \`${LIVE_SHA}\` |"
            echo ""
            echo "Relations: LIVE→backtest = \`${LIVE_VS_BACKTEST}\`, LIVE→api = \`${LIVE_VS_API}\`, api→backtest = \`${API_VS_BACKTEST}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

          DRIFT=0
          MSG=""

          # A destructive migration that LIVE lacks but a schema owner has is the
          # only thing that makes a "behind" state dangerous. Reuse the repo's
          # canonical destructive definition over the LIVE..owner range. The
          # `--ignore-allow-marker` flag is intentional: the PR-time escape hatch
          # asserts every container is already past the Expand release, which says
          # nothing about a LIVE runner that is, right now, demonstrably behind.
          scan_destructive() {
            python scripts/check_destructive_migrations.py \
              --base "$1" --head "$2" --ignore-allow-marker 2>&1
          }

          # The ONLY dangerous condition is the LIVE runner executing code that is
          # strictly OLDER than a schema-owning container AND a destructive
          # migration sits in between: it can drop columns the stale LIVE ORM still
          # maps, making every LIVE profile read raise UndefinedColumnError. LIVE
          # being equal to, AHEAD of, or behind only by ADDITIVE migrations is safe.
          if [ "${LIVE_VS_BACKTEST}" = "behind" ]; then
            if SCAN="$(scan_destructive "${LIVE_SHA}" "${BACKTEST_SHA}")"; then
              echo "LIVE behind backtest by additive-only migrations — safe."
              echo "${SCAN}"
            else
              DRIFT=1
              MSG="${MSG}\n- LIVE runner (${LIVE_SHA}) is BEHIND the alembic-owning backtest container (${BACKTEST_SHA}) and a DESTRUCTIVE migration sits in between:\n\`\`\`\n${SCAN}\n\`\`\`"
            fi
          fi
          if [ "${LIVE_VS_API}" = "behind" ]; then
            if SCAN="$(scan_destructive "${LIVE_SHA}" "${API_SHA}")"; then
              echo "LIVE behind api by additive-only migrations — safe."
              echo "${SCAN}"
            else
              DRIFT=1
              MSG="${MSG}\n- LIVE runner (${LIVE_SHA}) is BEHIND the schema-owning api container (${API_SHA}) and a DESTRUCTIVE migration sits in between:\n\`\`\`\n${SCAN}\n\`\`\`"
            fi
          fi

          # Inconclusive ancestry must not silently pass — a missing or diverged
          # SHA could mask a real drift, so surface it for manual inspection.
          if [ "${LIVE_VS_BACKTEST}" = "unknown" ] || [ "${LIVE_VS_API}" = "unknown" ]; then
            DRIFT=1
            MSG="${MSG}\n- Could not resolve git ancestry for a LIVE/schema-owner SHA (not found in history). Inspect manually."
          fi
          if [ "${LIVE_VS_BACKTEST}" = "diverged" ] || [ "${LIVE_VS_API}" = "diverged" ]; then
            DRIFT=1
            MSG="${MSG}\n- LIVE runner SHA has diverged from a schema owner (no ancestor relationship). Inspect manually."
          fi

          if [ "${DRIFT}" -eq 1 ]; then
            MSG="${MSG}\n  Redeploy the LIVE runner: \`gh workflow run deploy-runner-test-live.yml --ref main\` so it is no longer behind the destructive schema change."
            {
              echo ""
              echo "#### ⚠️ DRIFT DETECTED"
              echo -e "${MSG}"
            } >> "${GITHUB_STEP_SUMMARY}"
            echo -e "DRIFT DETECTED:${MSG}"
            exit 1
          fi

          # Note (informational only): a LIVE runner that merely lags behind the
          # schema owners by ADDITIVE migrations is safe and is NOT failed — only a
          # LIVE-behind-a-destructive-migration state is. api and backtest can also
          # legitimately differ because their `paths:` filters trigger on different
          # file sets.
          {
            echo ""
            echo "✅ LIVE runner is not behind any DESTRUCTIVE schema change."
          } >> "${GITHUB_STEP_SUMMARY}"
          echo "OK: LIVE runner is not behind any destructive schema change (LIVE→backtest=${LIVE_VS_BACKTEST}, LIVE→api=${LIVE_VS_API})."
